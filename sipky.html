<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVG Terč na šipky</title>
  <link rel="stylesheet" href="sipky.css" />
</head>
<body>
  <div class="container">
    <h1>HTML Terč na šipky</h1>
    <div class="dartboard">
      <svg viewBox="-50 -50 500 500" width="400" height="400" role="img" aria-label="Terč na šipky">
        <g transform="translate(200,200)">
          <defs>
            <path id="segmentPath" d="M0 0 L190 0 A190 190 0 0 1 180.9 65.7 Z"/>
          </defs>

          <g id="segments">
            <a href="#" data-segment="20" tabindex="0" aria-label="Segment 20">
              <g transform="rotate(9)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="1" tabindex="0" aria-label="Segment 1">
              <g transform="rotate(27)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="18" tabindex="0" aria-label="Segment 18">
              <g transform="rotate(45)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="4" tabindex="0" aria-label="Segment 4">
              <g transform="rotate(63)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="13" tabindex="0" aria-label="Segment 13">
              <g transform="rotate(81)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="6" tabindex="0" aria-label="Segment 6">
              <g transform="rotate(99)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="10" tabindex="0" aria-label="Segment 10">
              <g transform="rotate(117)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="15" tabindex="0" aria-label="Segment 15">
              <g transform="rotate(135)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="2" tabindex="0" aria-label="Segment 2">
              <g transform="rotate(153)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="17" tabindex="0" aria-label="Segment 17">
              <g transform="rotate(171)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="3" tabindex="0" aria-label="Segment 3">
              <g transform="rotate(189)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="19" tabindex="0" aria-label="Segment 19">
              <g transform="rotate(207)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="7" tabindex="0" aria-label="Segment 7">
              <g transform="rotate(225)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="16" tabindex="0" aria-label="Segment 16">
              <g transform="rotate(243)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="8" tabindex="0" aria-label="Segment 8">
              <g transform="rotate(261)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="11" tabindex="0" aria-label="Segment 11">
              <g transform="rotate(279)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="14" tabindex="0" aria-label="Segment 14">
              <g transform="rotate(297)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="9" tabindex="0" aria-label="Segment 9">
              <g transform="rotate(315)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
            <a href="#" data-segment="12" tabindex="0" aria-label="Segment 12">
              <g transform="rotate(333)">
                <use href="#segmentPath" fill="#fff"/>
              </g>
            </a>
            <a href="#" data-segment="5" tabindex="0" aria-label="Segment 5">
              <g transform="rotate(351)">
                <use href="#segmentPath" fill="#000"/>
              </g>
            </a>
          </g>

          <!-- Kruhové zóny -->
          <circle r="190" fill="none" stroke="red" stroke-width="8"/>
          <circle r="120" fill="none" stroke="green" stroke-width="8"/>
          <circle r="50" fill="none" stroke="red" stroke-width="8"/>
          <circle r="10" fill="green"/>
          <circle r="5" fill="red"/>
        </g>

        <!-- Čísla kolem terče -->
        <g transform="translate(200,200)">
          <g id="numbers" fill="white" font-size="20" text-anchor="middle">
            <text x="0" y="-210">20</text>
            <text x="70" y="-200">1</text>
            <text x="130" y="-170">18</text>
            <text x="180" y="-120">4</text>
            <text x="210" y="-60">13</text>
            <text x="220" y="10">6</text>
            <text x="210" y="70">10</text>
            <text x="180" y="130">15</text>
            <text x="130" y="180">2</text>
            <text x="70" y="210">17</text>
            <text x="0" y="220">3</text>
            <text x="-70" y="210">19</text>
            <text x="-130" y="180">7</text>
            <text x="-180" y="130">16</text>
            <text x="-210" y="70">8</text>
            <text x="-220" y="10">11</text>
            <text x="-210" y="-60">14</text>
            <text x="-180" y="-120">9</text>
            <text x="-130" y="-170">12</text>
            <text x="-70" y="-200">5</text>
          </g>
        </g>
      </svg>
    </div>

    <button class="start-button">Start</button>

    <div class="scoreboard">
      <div class="player-display">Hráč 1: 0</div>
      <div class="player-display">Hráč 2: 0</div>
      <div class="player-display">Hráč 3: 0</div>
      <div class="player-display">Hráč 4: 0</div>
    </div>
  </div>
</body>
</html>
